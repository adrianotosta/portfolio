<!DOCTYPE html>
    <html class="no-js" lang="en">
	<head>
		<meta charset="utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width initial-scale=1">

		<title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
		<meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">

		<link rel="stylesheet" href="{{ "/css/main.css" | prepend: site.baseurl }}">
<!--		<link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">-->
<!--		<link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ "/feed.xml" | prepend: site.baseurl | prepend: site.url }}" />-->
		<script src="js/vendor/modernizr-2.6.2.min.js"></script>
	</head>
    <body>
       <h1 class="screenReader">My Portfolio - Adriano Tosta</h1>
        <header class="top">
            <nav class="menu">
               <ul class="list list--unstyled">
                   <li><a href="#home" name="">home</a></li>
                   <li><a href="#aboutme" name="">about</a></li>
                   <li><a href="#works" name="">works</a></li>
                   <li><a href="#contact" name="">contacts</a></li>
               </ul>
            </nav>
        </header>
<!--           <h1 class="screenReader">My Portfolio</h1>-->
        <div class="content">
            <section id="home" class="animated fadeInUp page">
                {% include introduction.html %}
            </section>
            <section id="aboutme" class="animated page author">
                {% include aboutme.html %}
            </section>
            <section id="works" class="animated page">
                {% include works.html %}
            </section>
            <section id="contact" class="animated page">
                {% include contact.html %}
            </section>
        </div>
        <script data-main="js/scripts" src="js/vendor/require.js"></script>
    </body>
</html>
